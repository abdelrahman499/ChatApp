<div class="chat-container mt-5">

  <!-- Header -->
  <div class="chat-header">
    <h3 class="text-center my-2">
      Welcome to <span class="text-warning">Room</span> Group
    </h3>
    <button (click)="leaveChat()" class="btn btn-danger">Leave Chat</button>
  </div>

  <!-- Main Layout -->
  <div class="messaging">

    <!-- LEFT: Connected Users -->
    <div class="inbox-msg">
      <div class="inbox-people">

        <div class="headline-srch">
          <div class="recent-heading">
            <h4 class="text-white">Connected Users</h4>
          </div>
        </div>

        <div class="srch-bar">
          <div class="stylish-input-group">
            <input type="text" class="search-bar" placeholder="Search" />
          </div>
        </div>

        <div class="chat-people" *ngFor="let user of connectedUsers">
          <div class="chat-img">
            <img src="/R.png" alt="User Image" width="43" height="43" />
          </div>
          <div class="chat-ib mt-3">
            <h5>{{ user }} <span class="online"></span></h5>
          </div>
        </div>

      </div>
    </div>

    <!-- RIGHT: Messages -->
    <div class="mesgs">
      <div class="msg_history" #scrollMe>

        <ng-container *ngFor="let message of messages">

          <!-- SYSTEM MESSAGE -->
          <div class="system-msg" *ngIf="message.user === 'System'">
            <span>{{ message.message }}</span>
          </div>

          <!-- INCOMING (left side) -->
          <div class="bubble-row incoming"
               *ngIf="message.user !== loggedInUserName && message.user !== 'System'">
            <img src="/R.png" class="bubble-avatar" alt="avatar" />
            <div class="bubble-wrap">
              <span class="bubble-name">{{ message.user }}</span>
              <div class="bubble incoming-bubble">
                <p>{{ message.message }}</p>
                <span class="bubble-time">{{ message.messageTime | date:'shortTime' }}</span>
              </div>
            </div>
          </div>

          <!-- OUTGOING (right side) -->
          <div class="bubble-row outgoing" *ngIf="message.user === loggedInUserName">
            <div class="bubble-wrap">
              <span class="bubble-name">You</span>
              <div class="bubble outgoing-bubble">
                <p>{{ message.message }}</p>
                <span class="bubble-time">{{ message.messageTime | date:'shortTime' }}</span>
              </div>
            </div>
            <img src="/R.png" class="bubble-avatar" alt="avatar" />
          </div>

        </ng-container>

      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input">
    <input
      (keydown.enter)="sendMessage()"
      [formControl]="messageControl"
      placeholder="Type a message..."
    />
    <button (click)="sendMessage()" class="msg-send-btn" type="button">
      Send
    </button>
  </div>

</div>
