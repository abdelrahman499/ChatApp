<div class="container">
  <div class="row">
    <div class="col-md-6 offset-md-3">

      <h2 class="text-center mt-5 text-dark">Welcome To Chat</h2>
      <div class="text-center mb-5 text-dark">Please Join The Room</div>

      <div class="card my-5">
        <form [formGroup]="joinRoomForm"
              class="card-body cardbody-color p-lg-5"
              (ngSubmit)="onSubmit()">

          <div class="text-center">
            <img src="/OIP.webp"
                 class="img-fluid profile-image-pic img-thumbnail rounded-circle my-3"
                 width="200px" />
          </div>

          <div class="mb-3">
            <input formControlName="name"
                   type="text"
                   class="form-control"
                   placeholder="Display Name">
          </div>

          <div class="mb-3">
            <input formControlName="room"
                   type="text"
                   class="form-control"
                   placeholder="Room Name">
          </div>

          <div class="text-center">
            <button type="submit"
                    [disabled]="joinRoomForm.invalid"
                    class="btn btn-color px-5 mb-m w-100">
              Join
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>
